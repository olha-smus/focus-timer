<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Focus Timer</title>

<style>
    :root {
        --paper: #F7F2EB;
        --paper-soft: #FBF6EF;

        --terracotta: #C98263;
        --sage: #8B9475;
        --sage-soft: #DDE2D0;

        --brown: #6B4D3D;
        --muted: #A88975;
        --line: #E7D5C4;
        --ring-track: #EADBCD;

        --btn-set: #C5A19A;
        --btn-set-dark: #AD867E;

        --btn-start: #C98263;
        --btn-start-dark: #AE6D55;

        --btn-pause: #87977E;
        --btn-pause-dark: #718268;

        --btn-reset: #B8A477;
        --btn-reset-dark: #9F8B63;
    }

    * {
        box-sizing: border-box;
    }

    html,
    body {
        margin: 0;
        padding: 0;
        width: max-content;
        height: max-content;
        min-width: 0;
        min-height: 0;
        background: transparent;
        overflow: hidden;
        font-family: "Segoe UI", Arial, sans-serif;
        color: var(--brown);
    }

    body {
        display: block;
    }

    .timer {
        width: 340px;
        margin: 0;
        padding: 22px 18px 16px;
        border-radius: 24px;
        background: var(--paper);
        border: 1px solid rgba(221, 204, 187, 0.75);
        position: relative;
        overflow: hidden;
        box-shadow: none;
    }

    .content {
        position: relative;
        z-index: 2;
        text-align: center;
    }

    .top {
        margin-bottom: 18px;
    }

    .eyebrow {
        font-size: 10px;
        letter-spacing: 2.7px;
        text-transform: uppercase;
        color: var(--sage);
        font-weight: 800;
        margin-bottom: 8px;
    }

    h1 {
        margin: 0;
        font-family: Georgia, "Times New Roman", serif;
        font-size: 34px;
        line-height: 1;
        font-weight: 500;
        color: var(--terracotta);
    }

    .subtitle {
        margin: 10px auto 0;
        max-width: 255px;
        font-size: 13px;
        line-height: 1.45;
        color: var(--muted);
    }

    .circle-wrap {
        display: flex;
        justify-content: center;
        margin: 20px 0;
    }

    .circle {
        --angle: 0deg;
        width: 194px;
        height: 194px;
        border-radius: 50%;
        padding: 8px;
        background: conic-gradient(var(--terracotta) var(--angle), var(--ring-track) 0deg);
        position: relative;
    }

    .circle::before {
        content: "";
        position: absolute;
        inset: 20px;
        border-radius: 50%;
        border: 1px dashed rgba(139,148,117,0.28);
        pointer-events: none;
    }

    .circle-inner {
        width: 100%;
        height: 100%;
        border-radius: 50%;
        background: radial-gradient(circle at 50% 32%, #FFFDF8, var(--paper-soft));
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
    }

    .time {
        font-family: Georgia, "Times New Roman", serif;
        font-size: 48px;
        line-height: 1;
        font-weight: 600;
        color: var(--brown);
        letter-spacing: 1px;
        margin-bottom: 10px;
    }

    .status {
        padding: 7px 15px;
        border-radius: 999px;
        background: rgba(221,226,208,0.78);
        color: #70795E;
        font-size: 10px;
        letter-spacing: 1.4px;
        text-transform: uppercase;
        font-weight: 900;
    }

    .input-area {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 9px;
        margin-bottom: 16px;
    }

    input {
        width: 76px;
        height: 38px;
        border-radius: 999px;
        border: 1px solid var(--line);
        background: #FFFDF8;
        color: var(--brown);
        outline: none;
        text-align: center;
        font-size: 15px;
        font-weight: 700;
    }

    input::placeholder {
        color: #B89B86;
    }

    .input-label {
        color: var(--muted);
        font-size: 13px;
    }

    .preset-row {
        display: flex;
        justify-content: center;
        gap: 8px;
        margin-bottom: 18px;
    }

    .preset {
        height: 30px;
        padding: 0 13px;
        border-radius: 999px;
        border: 1px solid rgba(139,148,117,0.26);
        background: rgba(221,226,208,0.72);
        color: #6F785E;
        font-size: 11px;
        font-weight: 800;
        letter-spacing: 0.2px;
        cursor: pointer;
        transition: 0.2s ease;
    }

    .preset:hover {
        background: #CBD3BC;
        transform: translateY(-1px);
    }

    .buttons {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 8px;
    }

    button {
        height: 40px;
        border: none;
        border-radius: 999px;
        cursor: pointer;
        font-size: 12px;
        font-weight: 800;
        letter-spacing: 0.2px;
        color: #FFF8EF;
        transition: 0.2s ease;
    }

    .btn-set {
        background:
            linear-gradient(180deg, rgba(255,255,255,0.16), transparent),
            var(--btn-set);
    }

    .btn-start {
        background:
            linear-gradient(180deg, rgba(255,255,255,0.16), transparent),
            var(--btn-start);
    }

    .btn-pause {
        background:
            linear-gradient(180deg, rgba(255,255,255,0.14), transparent),
            var(--btn-pause);
    }

    .btn-reset {
        background:
            linear-gradient(180deg, rgba(255,255,255,0.16), transparent),
            var(--btn-reset);
    }

    .btn-set:hover {
        background:
            linear-gradient(180deg, rgba(255,255,255,0.12), transparent),
            var(--btn-set-dark);
    }

    .btn-start:hover {
        background:
            linear-gradient(180deg, rgba(255,255,255,0.12), transparent),
            var(--btn-start-dark);
    }

    .btn-pause:hover {
        background:
            linear-gradient(180deg, rgba(255,255,255,0.12), transparent),
            var(--btn-pause-dark);
    }

    .btn-reset:hover {
        background:
            linear-gradient(180deg, rgba(255,255,255,0.12), transparent),
            var(--btn-reset-dark);
    }

    button:hover {
        transform: translateY(-1px);
    }

    .botanical {
        position: absolute;
        left: 18px;
        bottom: 10px;
        width: 68px;
        height: 34px;
        opacity: 0.42;
    }

    .stem {
        position: absolute;
        left: 4px;
        bottom: 10px;
        width: 58px;
        height: 1px;
        background: var(--sage);
        transform: rotate(-9deg);
    }

    .leaf {
        position: absolute;
        width: 15px;
        height: 8px;
        border: 1px solid var(--sage);
        border-left: none;
        border-bottom: none;
        border-radius: 100% 0 100% 0;
    }

    .leaf.one {
        left: 18px;
        bottom: 15px;
        transform: rotate(-28deg);
    }

    .leaf.two {
        left: 35px;
        bottom: 9px;
        transform: rotate(145deg);
    }

    .leaf.three {
        left: 49px;
        bottom: 17px;
        transform: rotate(-25deg);
    }
</style>
</head>

<body>

<div class="timer">
    <div class="content">
        <div class="top">
            <div class="eyebrow">KITCHEN ROUTINE</div>
            <h1>Focus Timer</h1>
            <p class="subtitle">
                A gentle timer for cooking, baking, planning, and slow kitchen moments.
            </p>
        </div>

        <div class="circle-wrap">
            <div class="circle" id="timerCircle">
                <div class="circle-inner">
                    <div class="time" id="time">00:00</div>
                    <div class="status" id="status">READY</div>
                </div>
            </div>
        </div>

        <div class="input-area">
            <input id="minutesInput" type="number" min="1">
            <span class="input-label">minutes</span>
        </div>

        <div class="preset-row">
            <button class="preset" onclick="setPreset(10)">10 min</button>
            <button class="preset" onclick="setPreset(25)">25 min</button>
            <button class="preset" onclick="setPreset(45)">45 min</button>
        </div>

        <div class="buttons">
            <button class="btn-set" onclick="setTime()">Set</button>
            <button class="btn-start" onclick="start()">Start</button>
            <button class="btn-pause" onclick="pause()">Pause</button>
            <button class="btn-reset" onclick="reset()">Reset</button>
        </div>
    </div>

    <div class="botanical">
        <span class="stem"></span>
        <span class="leaf one"></span>
        <span class="leaf two"></span>
        <span class="leaf three"></span>
    </div>
</div>

<script>
let totalSeconds = 0;
let initialTime = 0;
let timer = null;
let running = false;

const timeDisplay = document.getElementById("time");
const statusLabel = document.getElementById("status");
const timerCircle = document.getElementById("timerCircle");
const minutesInput = document.getElementById("minutesInput");

function updateDisplay() {
    let m = Math.floor(totalSeconds / 60);
    let s = totalSeconds % 60;

    timeDisplay.textContent =
        String(m).padStart(2, "0") + ":" +
        String(s).padStart(2, "0");

    if (initialTime > 0) {
        let progress = (initialTime - totalSeconds) / initialTime;
        let angle = progress * 360;
        timerCircle.style.setProperty("--angle", angle + "deg");
    } else {
        timerCircle.style.setProperty("--angle", "0deg");
    }
}

function setPreset(minutes) {
    clearInterval(timer);
    running = false;

    minutesInput.value = minutes;
    totalSeconds = minutes * 60;
    initialTime = totalSeconds;

    statusLabel.textContent = "READY";
    updateDisplay();
}

function setTime() {
    let min = Number(minutesInput.value);
    if (!min || min <= 0) return;

    clearInterval(timer);
    running = false;

    totalSeconds = min * 60;
    initialTime = totalSeconds;

    statusLabel.textContent = "READY";
    updateDisplay();
}

function start() {
    if (running || totalSeconds <= 0) return;

    running = true;
    statusLabel.textContent = "RUNNING";

    timer = setInterval(() => {
        if (totalSeconds > 0) {
            totalSeconds--;
            updateDisplay();
        } else {
            clearInterval(timer);
            running = false;
            statusLabel.textContent = "DONE";
            playPremiumSound();
        }
    }, 1000);
}

function pause() {
    clearInterval(timer);
    running = false;
    statusLabel.textContent = "PAUSED";
}

function reset() {
    clearInterval(timer);
    running = false;

    totalSeconds = 0;
    initialTime = 0;
    minutesInput.value = "";

    statusLabel.textContent = "READY";
    updateDisplay();
}

function playPremiumSound() {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const now = ctx.currentTime;

    function chime(freq, delay, duration, volume) {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();

        osc.type = "triangle";
        osc.frequency.setValueAtTime(freq, now + delay);

        gain.gain.setValueAtTime(0.0001, now + delay);
        gain.gain.exponentialRampToValueAtTime(volume, now + delay + 0.03);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + delay + duration);

        osc.connect(gain);
        gain.connect(ctx.destination);

        osc.start(now + delay);
        osc.stop(now + delay + duration);
    }

    chime(392.00, 0.00, 2.4, 0.16);
    chime(523.25, 0.18, 2.6, 0.13);
    chime(659.25, 0.40, 2.9, 0.10);
    chime(783.99, 0.68, 3.1, 0.08);
}

updateDisplay();
</script>

</body>
</html>
