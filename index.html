<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Prep Ritual Timer</title>

<style>
    :root {
        --cream: #F6EBDD;
        --paper: #FFF8EF;
        --paper-soft: #FBF0E5;
        --terracotta: #C98263;
        --terracotta-dark: #A96750;
        --sage: #8B9475;
        --sage-dark: #70795E;
        --sage-soft: #DDE2D0;
        --brown: #6B4D3D;
        --muted: #A88975;
        --line: #E7D5C4;
        --shadow: rgba(107, 77, 61, 0.16);
    }

    * {
        box-sizing: border-box;
    }

    body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background:
            radial-gradient(circle at 18% 20%, rgba(201,130,99,0.13), transparent 30%),
            radial-gradient(circle at 82% 80%, rgba(139,148,117,0.17), transparent 34%),
            linear-gradient(135deg, #FAF3EA, var(--cream));
        font-family: "Segoe UI", Arial, sans-serif;
        color: var(--brown);
    }

    .timer {
        width: 380px;
        padding: 30px 28px 28px;
        border-radius: 34px;
        background:
            linear-gradient(180deg, rgba(255,255,255,0.55), rgba(255,248,239,0.96)),
            var(--paper);
        border: 1px solid rgba(201,130,99,0.24);
        box-shadow: 0 28px 70px var(--shadow);
        position: relative;
        overflow: hidden;
    }

    .timer::before {
        content: "";
        position: absolute;
        inset: 14px;
        border: 1px solid rgba(231,213,196,0.85);
        border-radius: 25px;
        pointer-events: none;
    }

    .timer::after {
        content: "";
        position: absolute;
        top: -42px;
        right: -42px;
        width: 150px;
        height: 150px;
        border-radius: 50%;
        background: rgba(201,130,99,0.08);
    }

    .content {
        position: relative;
        z-index: 2;
    }

    .top {
        text-align: center;
        margin-bottom: 24px;
    }

    .eyebrow {
        font-size: 10px;
        letter-spacing: 2.5px;
        text-transform: uppercase;
        color: var(--sage);
        font-weight: 800;
        margin-bottom: 8px;
    }

    h1 {
        margin: 0;
        font-family: Georgia, "Times New Roman", serif;
        font-size: 34px;
        line-height: 1;
        font-weight: 500;
        color: var(--terracotta);
    }

    .subtitle {
        margin: 10px auto 0;
        max-width: 260px;
        font-size: 13px;
        line-height: 1.45;
        color: var(--muted);
    }

    .circle-wrap {
        display: flex;
        justify-content: center;
        margin: 24px 0 22px;
    }

    .circle {
        --angle: 0deg;

        width: 220px;
        height: 220px;
        border-radius: 50%;
        padding: 12px;
        background:
            conic-gradient(var(--terracotta) var(--angle), #EADBCD 0deg);
        box-shadow:
            0 18px 36px rgba(107,77,61,0.13),
            inset 0 0 0 1px rgba(201,130,99,0.14);
        position: relative;
    }

    .circle::before {
        content: "";
        position: absolute;
        inset: 24px;
        border-radius: 50%;
        border: 1px dashed rgba(139,148,117,0.35);
        pointer-events: none;
    }

    .circle-inner {
        width: 100%;
        height: 100%;
        border-radius: 50%;
        background:
            radial-gradient(circle at 50% 32%, #FFFDF8, var(--paper-soft));
        border: 1px solid rgba(231,213,196,0.95);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
    }

    .time {
        font-family: Georgia, "Times New Roman", serif;
        font-size: 48px;
        line-height: 1;
        font-weight: 600;
        color: var(--brown);
        letter-spacing: 1px;
        margin-bottom: 10px;
    }

    .status {
        padding: 7px 14px;
        border-radius: 999px;
        background: rgba(221,226,208,0.78);
        color: var(--sage-dark);
        font-size: 10px;
        letter-spacing: 1.4px;
        text-transform: uppercase;
        font-weight: 900;
    }

    .input-area {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 9px;
        margin-bottom: 16px;
    }

    input {
        width: 76px;
        height: 38px;
        border-radius: 999px;
        border: 1px solid var(--line);
        background: #FFFDF8;
        color: var(--brown);
        outline: none;
        text-align: center;
        font-size: 15px;
        font-weight: 700;
    }

    input::placeholder {
        color: #B89B86;
    }

    .input-label {
        color: var(--muted);
        font-size: 13px;
    }

    .preset-row {
        display: flex;
        justify-content: center;
        gap: 8px;
        margin-bottom: 18px;
    }

    .preset {
        border: 1px solid rgba(139,148,117,0.35);
        background: rgba(221,226,208,0.55);
        color: var(--sage-dark);
        box-shadow: none;
        width: auto;
        height: 30px;
        padding: 0 12px;
        font-size: 11px;
    }

    .preset:hover {
        background: rgba(221,226,208,0.9);
        color: var(--sage-dark);
    }

    .buttons {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 8px;
    }

    button {
        height: 40px;
        border: none;
        border-radius: 999px;
        cursor: pointer;
        background: var(--terracotta);
        color: #FFFDF8;
        font-size: 12px;
        font-weight: 800;
        box-shadow: 0 9px 18px rgba(201,130,99,0.22);
        transition: 0.2s ease;
    }

    button:hover {
        transform: translateY(-1px);
        background: var(--terracotta-dark);
    }

    button.sage {
        background: var(--sage);
        box-shadow: 0 9px 18px rgba(139,148,117,0.22);
    }

    button.sage:hover {
        background: var(--sage-dark);
    }

    .bottom-note {
        margin-top: 18px;
        padding-top: 15px;
        border-top: 1px solid var(--line);
        text-align: center;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.45;
    }

    .botanical {
        position: absolute;
        left: 26px;
        bottom: 22px;
        width: 68px;
        height: 34px;
        opacity: 0.58;
    }

    .stem {
        position: absolute;
        left: 4px;
        bottom: 10px;
        width: 58px;
        height: 1px;
        background: var(--sage);
        transform: rotate(-9deg);
    }

    .leaf {
        position: absolute;
        width: 15px;
        height: 8px;
        border: 1px solid var(--sage);
        border-left: none;
        border-bottom: none;
        border-radius: 100% 0 100% 0;
    }

    .leaf.one {
        left: 18px;
        bottom: 15px;
        transform: rotate(-28deg);
    }

    .leaf.two {
        left: 35px;
        bottom: 9px;
        transform: rotate(145deg);
    }

    .leaf.three {
        left: 49px;
        bottom: 17px;
        transform: rotate(-25deg);
    }
</style>
</head>

<body>

<div class="timer">
    <div class="content">
        <div class="top">
            <div class="eyebrow">Kitchen Routine</div>
            <h1>Focus Timer</h1>
            <p class="subtitle">A gentle timer for cooking, baking, planning, and slow kitchen moments.</p>
        </div>

        <div class="circle-wrap">
            <div class="circle" id="timerCircle">
                <div class="circle-inner">
                    <div class="time" id="time">00:00</div>
                    <div class="status" id="status">Ready</div>
                </div>
            </div>
        </div>

        <div class="input-area">
            <input id="minutesInput" type="number" placeholder="" min="1">
            <span class="input-label">minutes</span>
        </div>

        <div class="preset-row">
            <button class="preset" onclick="setPreset(10)">10 min</button>
            <button class="preset" onclick="setPreset(25)">25 min</button>
            <button class="preset" onclick="setPreset(45)">45 min</button>
        </div>

        <div class="buttons">
            <button onclick="setTime()">Set</button>
            <button onclick="start()">Start</button>
            <button class="sage" onclick="pause()">Pause</button>
            <button class="sage" onclick="reset()">Reset</button>
        </div>

        <div class="bottom-note">
            Designed for calm meal prep, cozy recipes, and mindful weekly planning.
        </div>
    </div>

    <div class="botanical">
        <span class="stem"></span>
        <span class="leaf one"></span>
        <span class="leaf two"></span>
        <span class="leaf three"></span>
    </div>
</div>

<script>
let totalSeconds = 0;
let initialTime = 0;
let timer = null;
let running = false;

const timeDisplay = document.getElementById("time");
const statusLabel = document.getElementById("status");
const timerCircle = document.getElementById("timerCircle");
const minutesInput = document.getElementById("minutesInput");

function updateDisplay() {
    let m = Math.floor(totalSeconds / 60);
    let s = totalSeconds % 60;

    timeDisplay.textContent =
        String(m).padStart(2, "0") + ":" +
        String(s).padStart(2, "0");

    if (initialTime > 0) {
        let progress = (initialTime - totalSeconds) / initialTime;
        let angle = progress * 360;
        timerCircle.style.setProperty("--angle", angle + "deg");
    } else {
        timerCircle.style.setProperty("--angle", "0deg");
    }
}

function setPreset(minutes) {
    minutesInput.value = minutes;
    totalSeconds = minutes * 60;
    initialTime = totalSeconds;
    statusLabel.textContent = "Ready";
    updateDisplay();
}

function setTime() {
    let min = Number(minutesInput.value);
    if (!min || min <= 0) return;

    clearInterval(timer);
    running = false;

    totalSeconds = min * 60;
    initialTime = totalSeconds;

    statusLabel.textContent = "Ready";
    updateDisplay();
}

function start() {
    if (running || totalSeconds <= 0) return;

    running = true;
    statusLabel.textContent = "Running";

    timer = setInterval(() => {
        if (totalSeconds > 0) {
            totalSeconds--;
            updateDisplay();
        } else {
            clearInterval(timer);
            running = false;
            statusLabel.textContent = "Done";
            playPremiumSound();
        }
    }, 1000);
}

function pause() {
    clearInterval(timer);
    running = false;
    statusLabel.textContent = "Paused";
}

function reset() {
    clearInterval(timer);
    running = false;
    totalSeconds = 0;
    initialTime = 0;
    statusLabel.textContent = "Reset";
    updateDisplay();
}

function playPremiumSound() {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const now = ctx.currentTime;

    function chime(freq, delay, duration, volume) {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();

        osc.type = "triangle";
        osc.frequency.setValueAtTime(freq, now + delay);

        gain.gain.setValueAtTime(0.0001, now + delay);
        gain.gain.exponentialRampToValueAtTime(volume, now + delay + 0.03);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + delay + duration);

        osc.connect(gain);
        gain.connect(ctx.destination);

        osc.start(now + delay);
        osc.stop(now + delay + duration);
    }

    chime(392.00, 0.00, 2.4, 0.16);
    chime(523.25, 0.18, 2.6, 0.13);
    chime(659.25, 0.40, 2.9, 0.10);
    chime(783.99, 0.68, 3.1, 0.08);
}

updateDisplay();
</script>

</body>
</html>
