<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Focus Timer Pro</title>

<style>
    body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #ff9a9e, #fbc2eb, #a6c1ee);
        background-size: 300% 300%;
        animation: gradientMove 10s ease infinite;
    }

    @keyframes gradientMove {
        0% {background-position: 0% 50%;}
        50% {background-position: 100% 50%;}
        100% {background-position: 0% 50%;}
    }

    .box {
        background: rgba(255,255,255,0.2);
        backdrop-filter: blur(15px);
        padding: 25px;              /* ↓ зменшено */
        border-radius: 25px;
        text-align: center;
        width: 240px;               /* ↓ було 320px */
        box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        color: #fff;
    }

    h1 {
        font-size: 16px;            /* ↓ було 22px */
        margin-bottom: 10px;
        letter-spacing: 1px;
    }

    input {
        width: 60px;               /* ↓ було 80px */
        padding: 6px;
        border-radius: 12px;
        border: none;
        text-align: center;
        font-size: 14px;
        margin-bottom: 12px;
        outline: none;
        background: rgba(255,255,255,0.8);
    }

    .time {
        font-size: 40px;           /* ↓ було 64px */
        font-weight: bold;
        margin: 15px 0;
        text-shadow: 0 0 10px rgba(255,255,255,0.4);
    }

    button {
        border: none;
        padding: 7px 10px;         /* ↓ менше */
        margin: 4px;
        border-radius: 10px;
        cursor: pointer;
        font-weight: bold;
        font-size: 12px;
        background: linear-gradient(135deg, #ff6ec4, #7873f5);
        color: white;
        transition: 0.2s;
    }

    button:hover {
        transform: translateY(-2px);
    }

    .status {
        margin-top: 12px;
        font-size: 12px;
        font-weight: bold;
        text-transform: uppercase;
        opacity: 0.9;
    }

    .progress {
        height: 5px;
        background: rgba(255,255,255,0.2);
        border-radius: 10px;
        overflow: hidden;
        margin-top: 15px;
    }

    .progress-bar {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #00f2fe, #4facfe);
        transition: width 1s linear;
    }
</style>
</head>

<body>

<div class="box">
    <h1>Focus Boost</h1>

    <input id="minutesInput" type="number" placeholder="min" min="1">

    <div class="time" id="time">00:00</div>

    <div>
        <button onclick="setTime()">Set</button>
        <button onclick="start()">Start</button>
        <button onclick="pause()">Pause</button>
        <button onclick="reset()">Reset</button>
    </div>

    <div class="progress">
        <div class="progress-bar" id="progressBar"></div>
    </div>

    <div class="status" id="status">Ready</div>
</div>

<script>
let totalSeconds = 0;
let initialTime = 0;
let timer = null;
let running = false;

const timeDisplay = document.getElementById("time");
const statusLabel = document.getElementById("status");
const progressBar = document.getElementById("progressBar");

function updateDisplay() {
    let m = Math.floor(totalSeconds / 60);
    let s = totalSeconds % 60;

    timeDisplay.textContent =
        String(m).padStart(2, '0') + ":" +
        String(s).padStart(2, '0');

    if (initialTime > 0) {
        let progress = ((initialTime - totalSeconds) / initialTime) * 100;
        progressBar.style.width = progress + "%";
    } else {
        progressBar.style.width = "0%";
    }
}

/* 🔊 PREMIUM SOFT MELODY (clean + not squeaky) */
function playPremiumSound() {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const now = ctx.currentTime;

    function tone(freq, time, duration, vol) {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        const filter = ctx.createBiquadFilter();

        osc.type = "triangle";

        filter.type = "lowpass";
        filter.frequency.setValueAtTime(1200, now + time);

        osc.frequency.setValueAtTime(freq, now + time);

        gain.gain.setValueAtTime(0.0001, now + time);
        gain.gain.exponentialRampToValueAtTime(vol, now + time + 0.05);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + time + duration);

        osc.connect(filter);
        filter.connect(gain);
        gain.connect(ctx.destination);

        osc.start(now + time);
        osc.stop(now + time + duration);
    }

    tone(440, 0.0, 0.5, 0.35);
    tone(659.25, 0.2, 0.6, 0.3);
    tone(523.25, 0.4, 0.7, 0.25);
}

function setTime() {
    let min = document.getElementById("minutesInput").value;
    if (!min || min <= 0) return;

    totalSeconds = min * 60;
    initialTime = totalSeconds;

    updateDisplay();
    statusLabel.textContent = "Ready";
}

function start() {
    if (running || totalSeconds <= 0) return;

    running = true;
    statusLabel.textContent = "Running";

    timer = setInterval(() => {
        if (totalSeconds > 0) {
            totalSeconds--;
            updateDisplay();
        } else {
            clearInterval(timer);
            running = false;
            statusLabel.textContent = "Done";
            playPremiumSound();
        }
    }, 1000);
}

function pause() {
    clearInterval(timer);
    running = false;
    statusLabel.textContent = "Paused";
}

function reset() {
    clearInterval(timer);
    running = false;
    totalSeconds = 0;
    initialTime = 0;
    updateDisplay();
    statusLabel.textContent = "Reset";
}

updateDisplay();
</script>

</body>
</html>
